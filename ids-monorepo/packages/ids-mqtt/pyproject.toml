[tool.poetry]
name = "ids-mqtt"
version = "0.1.0"
description = "MQTT client wrapper for Smart Home IDS"
authors = ["Security Team <security@smarthome.ids>"]
license = "MIT"

[tool.poetry.dependencies]
python = "^3.11"
paho-mqtt = "^2.0"
pydantic = "^2.0"
ids-core = { path = "../ids-core", develop = true }
ids-schemas = { path = "../ids-schemas", develop = true }

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"