[tool.poetry]
name = "ids-ml-plugins"
version = "0.1.0"
description = "ML plugin framework for Smart Home IDS with multiple backend support"
authors = ["Security Team <security@smarthome.ids>"]
license = "MIT"

[tool.poetry.dependencies]
python = "^3.11"
numpy = "^1.26.0"
pydantic = "^2.0"
scikit-learn = "^1.4.0"
onnxruntime = { version = "^1.16.0", optional = true }
joblib = "^1.3.0"
psutil = "^5.9.0"
structlog = "^23.1"
coloredlogs = "^15.0.0"

[tool.poetry.extras]
onnx = ["onnxruntime"]
gpu = ["onnxruntime-gpu"]
tensorflow = ["tensorflow"]
pytorch = ["torch"]

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.0"
pytest-asyncio = "^0.21.0"
pytest-cov = "^4.1.0"
black = "^23.0.0"
ruff = "^0.1.0"
mypy = "^1.6.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 88
target-version = ["py311"]

[tool.ruff]
target-version = "py311"
line-length = 88

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[[tool.mypy.overrides]]
module = [
    "scikit-learn",
    "onnxruntime",
    "numpy",
]
ignore_missing_imports = true